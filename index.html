<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGRO-NEXUS 2050 — Zeka ve STEM Testi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #02060f;
    --bg-panel: #0a101d;
    --neon-green: #00fa9a;
    --neon-cyan: #00d4ff;
    --neon-red: #ff2a4b;
    --neon-yellow: #ffcc00;
    --text-main: #d1e8e2;
    --text-muted: #4b6a78;
    --font-head: 'Orbitron', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

  body, html {
    width: 100%; height: 100%;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: var(--font-body);
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  /* Cyberpunk Grid Background */
  #bg-grid {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background-image: 
      linear-gradient(rgba(0, 250, 154, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 250, 154, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: center center;
  }

  /* Scanline Effect */
  #scanline {
    position: fixed; top: 0; left: 0; width: 100%; height: 5px;
    background: var(--neon-cyan); opacity: 0.15; z-index: 100;
    animation: scan 4s linear infinite; pointer-events: none;
  }
  @keyframes scan { 0% { top: -10px; } 100% { top: 100%; } }

  /* Top Navigation */
  #top-bar {
    width: 90%; max-width: 800px; display: flex; justify-content: space-between; align-items: center;
    padding: 15px; margin-bottom: 20px; border-bottom: 1px solid rgba(0,212,255,0.2);
  }
  .brand { font-family: var(--font-head); font-size: 1.2rem; color: var(--neon-green); letter-spacing: 2px; }
  .btn-ui {
    background: rgba(0, 212, 255, 0.1); border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan); padding: 8px 15px; border-radius: 5px; cursor: pointer;
    font-family: var(--font-head); font-size: 0.9rem; transition: all 0.3s;
  }
  .btn-ui:hover { background: var(--neon-cyan); color: var(--bg-dark); box-shadow: 0 0 15px var(--neon-cyan); }

  /* Game Container */
  #game-container {
    width: 90%; max-width: 800px; height: 60vh;
    background: var(--bg-panel); border: 1px solid rgba(0, 250, 154, 0.2);
    border-radius: 15px; display: flex; flex-direction: column; position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,250,154,0.05);
  }

  /* Level Header */
  #level-header {
    padding: 20px; text-align: center; border-bottom: 1px dashed rgba(255,255,255,0.1);
    font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; min-height: 80px; display: flex; align-items: center; justify-content: center;
  }
  
  /* Interactive Title Words (Eski 1. seviyeden kalan stil, artık nadir kullanılıyor) */
  .drag-word {
    color: var(--neon-red); font-weight: 900; cursor: grab; padding: 0 5px;
    text-shadow: 0 0 8px rgba(255,42,75,0.6); display: inline-block; position: relative;
  }
  .drag-word:active { cursor: grabbing; }

  /* Main Play Area */
  #play-area {
    flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
  }

  /* Game Objects (SVGs) */
  .obj { position: absolute; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .drag { cursor: grab; }
  .drag:active { cursor: grabbing; }
  .svg-icon { width: 100%; height: 100%; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .glow-g { stroke: var(--neon-green); filter: drop-shadow(0 0 6px var(--neon-green)); }
  .glow-c { stroke: var(--neon-cyan); filter: drop-shadow(0 0 6px var(--neon-cyan)); }
  .glow-r { stroke: var(--neon-red); filter: drop-shadow(0 0 6px var(--neon-red)); }
  .glow-y { stroke: var(--neon-yellow); filter: drop-shadow(0 0 6px var(--neon-yellow)); }

  /* Modals */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(2, 6, 15, 0.85); backdrop-filter: blur(5px); z-index: 50;
    align-items: center; justify-content: center;
  }
  .modal-box {
    background: var(--bg-panel); border: 2px solid var(--neon-green); border-radius: 10px;
    padding: 30px; width: 90%; max-width: 500px; text-align: center;
    box-shadow: 0 0 40px rgba(0, 250, 154, 0.2); animation: popIn 0.3s ease-out;
  }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  .modal-title { font-family: var(--font-head); font-size: 1.5rem; margin-bottom: 15px; }
  .modal-desc { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 25px; line-height: 1.6; }
  .modal-fact { background: rgba(0, 250, 154, 0.1); padding: 15px; border-left: 3px solid var(--neon-green); font-size: 1.1rem; color: var(--text-main); margin-bottom: 25px; text-align: left;}
  
  .btn-main {
    background: transparent; border: 2px solid var(--neon-green); color: var(--neon-green);
    font-family: var(--font-head); font-size: 1.1rem; padding: 12px 25px; border-radius: 5px; cursor: pointer; transition: 0.3s;
  }
  .btn-main:hover { background: var(--neon-green); color: var(--bg-dark); }
  
  /* Custom Inputs */
  .pw-input {
    background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
    font-family: var(--font-head); font-size: 2rem; text-align: center; padding: 10px;
    width: 200px; border-radius: 5px; outline: none; margin-bottom: 20px; letter-spacing: 5px;
  }
  .pw-input:focus { box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

  /* Animations for levels */
  .shake { animation: shakeAnim 0.4s; }
  @keyframes shakeAnim { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
</style>
</head>
<body>

<div id="bg-grid"></div>
<div id="scanline"></div>

<div id="top-bar">
  <div class="brand">AGRO-NEXUS_2050</div>
  <div>
    <button class="btn-ui" onclick="showModal('hintModal')">VERİTABANI [?]</button>
    <button id="btn-fs" class="btn-ui" onclick="toggleFullScreen()">TAM EKRAN</button>
  </div>
</div>

<div id="game-container">
  <div id="level-header">Bağlantı Kuruluyor...</div>
  <div id="play-area"></div>
</div>

<div id="hintModal" class="modal-overlay">
  <div class="modal-box" style="border-color: var(--neon-cyan);">
    <div class="modal-title" style="color: var(--neon-cyan);">SİSTEM İPUCU</div>
    <div class="modal-desc" id="hint-text"></div>
    <button class="btn-main" style="border-color: var(--neon-cyan); color: var(--neon-cyan);" onclick="hideModal('hintModal')">ANLADIM</button>
  </div>
</div>

<div id="successModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" style="color: var(--neon-green);">PROTOKOL BAŞARILI</div>
    <div class="modal-fact" id="fact-text"></div>
    <button class="btn-main" onclick="nextLevel()">SONRAKİ MODÜL &gt;&gt;</button>
  </div>
</div>

<div id="pwModal" class="modal-overlay">
  <div class="modal-box" style="border-color: var(--neon-yellow);">
    <div class="modal-title" style="color: var(--neon-yellow);">GÜVENLİK DUVARI</div>
    <div class="modal-desc" id="pw-hint">Geçiş kodunu girin.</div>
    <input type="text" id="pw-input" class="pw-input" autocomplete="off">
    <br>
    <button class="btn-main" style="border-color: var(--neon-yellow); color: var(--neon-yellow);" onclick="checkPassword()">ONAYLA</button>
    <button class="btn-main" style="border-color: var(--neon-red); color: var(--neon-red); margin-left: 10px;" onclick="hideModal('pwModal')">İPTAL</button>
  </div>
</div>

<div id="finalModal" class="modal-overlay">
  <div class="modal-box" style="border-color: var(--neon-yellow); box-shadow: 0 0 50px rgba(255, 204, 0, 0.3);">
    <div class="modal-title" style="color: var(--neon-green); font-size: 2rem;">MİSYON TAMAMLANDI</div>
    <div class="modal-desc" style="font-size: 1.2rem;">2050 Akıllı Çiftlik Ağları %100 Senkronize edildi. Üstün mühendislik becerilerin sayesinde sistem kurtarıldı!</div>
    
    <div style="margin: 30px 0; padding: 25px; border: 3px dashed var(--neon-yellow); background: rgba(255, 204, 0, 0.1); border-radius: 10px;">
      <div style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 10px;">SİSTEM TARAFINDAN OLUŞTURULAN GİZLİ ŞİFRENİZ:</div>
      <div style="font-size: 3.5rem; font-weight: 900; color: var(--neon-yellow); font-family: var(--font-head); letter-spacing: 5px; text-shadow: 0 0 20px rgba(255, 204, 0, 0.8);">çiftlik</div>
    </div>
    
    <button class="btn-main" style="border-color: var(--neon-yellow); color: var(--neon-yellow);" onclick="hideModal('finalModal')">AĞI KAPAT</button>
  </div>
</div>

<script>
  // Global Variables
  let currentLevel = 0;
  let activeLevelLogic = null;
  let expectedPW = "";

  // Helper Functions
  const $ = id => document.getElementById(id);
  const playArea = $('play-area');
  const levelHeader = $('level-header');

  const showModal = id => $(id).style.display = 'flex';
  const hideModal = id => $(id).style.display = 'none';
  const win = () => setTimeout(() => showModal('successModal'), 400);

  // Full Screen Control & Dynamic Button Text
  function toggleFullScreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }

  document.addEventListener('fullscreenchange', () => {
    const fsBtn = $('btn-fs');
    if (document.fullscreenElement) {
      fsBtn.innerHTML = "xÇIKIŞ";
      fsBtn.style.color = "var(--neon-red)";
      fsBtn.style.borderColor = "var(--neon-red)";
      fsBtn.style.background = "rgba(255, 42, 75, 0.1)";
    } else {
      fsBtn.innerHTML = "TAM EKRAN";
      fsBtn.style.color = "var(--neon-cyan)";
      fsBtn.style.borderColor = "var(--neon-cyan)";
      fsBtn.style.background = "rgba(0, 212, 255, 0.1)";
    }
  });

  // Robust Drag Engine
  function makeDraggable(el, onMove, onDrop) {
    if (!el) return;
    let isDragging = false, startX, startY, initX, initY;

    const startDrag = (e) => {
      isDragging = true;
      const evt = e.type.includes('mouse') ? e : e.touches[0];
      startX = evt.clientX; startY = evt.clientY;
      initX = el.offsetLeft; initY = el.offsetTop;
      el.style.zIndex = 1000;
      document.addEventListener(e.type.includes('mouse') ? 'mousemove' : 'touchmove', drag, {passive: false});
      document.addEventListener(e.type.includes('mouse') ? 'mouseup' : 'touchend', endDrag);
    };

    const drag = (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const evt = e.type.includes('mouse') ? e : e.touches[0];
      let dx = evt.clientX - startX;
      let dy = evt.clientY - startY;
      el.style.position = 'absolute';
      el.style.left = `${initX + dx}px`;
      el.style.top = `${initY + dy}px`;
      if (onMove) onMove(el, evt.clientX, evt.clientY);
    };

    const endDrag = (e) => {
      if (!isDragging) return;
      isDragging = false;
      el.style.zIndex = 10;
      document.removeEventListener('mousemove', drag);
      document.removeEventListener('touchmove', drag);
      document.removeEventListener('mouseup', endDrag);
      document.removeEventListener('touchend', endDrag);
      if (onDrop) onDrop(el);
    };

    el.onmousedown = startDrag;
    el.ontouchstart = startDrag;
  }

  function checkCollision(el1, el2) {
    if (!el1 || !el2) return false;
    const r1 = el1.getBoundingClientRect();
    const r2 = el2.getBoundingClientRect();
    return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
  }

  // Database of Brain-Test Style Levels
  const levels = [
    {
      title: "Modül 1: Toprak nem sensörü devre dışı. Sensörü toprağa yerleştirerek sistemi başlat.",
      hint: "Nem sensörünü (mavi ikon) tut ve hidroponik yatağın (yeşil alan) içine sürükle.",
      fact: "Akıllı tarımda IoT (Nesnelerin İnterneti) sensörleri; toprağın nem, pH ve mineral değerlerini anlık olarak analiz edip sulama sistemlerini tamamen otonom hale getirir.",
      setup: () => {
        playArea.innerHTML = `
          <div id="soil-bed" class="obj" style="bottom: 15%; width: 140px; height: 50px; border-bottom: 5px solid var(--neon-green); border-radius: 10px;">
            <div style="position:absolute; bottom: -25px; font-weight:bold; color:var(--text-muted); width:max-content;">HİDROPONİK YATAK</div>
          </div>
          <div id="sensor" class="obj drag" style="top: 20%; left: 20%; width: 60px; height: 60px; background: rgba(0,212,255,0.1); border-radius: 8px; border: 1px dashed var(--neon-cyan);">
            <svg class="svg-icon glow-c" style="width:40px; height:40px;" viewBox="0 0 24 24"><path d="M12 2v8M8 10h8M12 10v12M9 22h6"/></svg>
            <span style="position:absolute; top:-25px; font-size:11px; font-weight:bold; color:var(--neon-cyan); white-space:nowrap;">NEM SENSÖRÜ</span>
          </div>
        `;
        makeDraggable($('sensor'), null, (el) => {
          if (checkCollision(el, $('soil-bed'))) {
            el.style.display = 'none';
            $('soil-bed').innerHTML = `
              <svg class="svg-icon glow-g" style="width:50px;height:50px;margin-bottom:10px;" viewBox="0 0 24 24"><path d="M12 22V8m0 0C8 8 4 12 4 16h16c0-4-4-8-8-8zm0 0V2m0 0l-3 3m3-3l3 3"/></svg>
              <div style="position:absolute; bottom: -25px; font-weight:bold; color:var(--neon-green); width:max-content;">SİSTEM AKTİF</div>
            `;
            win();
          }
        });
      }
    },
    {
      title: "Modül 2: Güneş tutulması var! Güneş panelleri şarj olmuyor. Çözüm üret.",
      hint: "Güneşi hareket ettiremezsin ama belki Güneş'in önünü kapatan cismi sürükleyip yoldan çekebilirsin.",
      fact: "Uzay tabanlı güneş enerjisi sistemleri (SBSP), atmosferden ve gece/gündüz döngüsünden etkilenmeden 7/24 enerji toplayıp dünyaya lazerlerle iletecek.",
      setup: () => {
        playArea.innerHTML = `
          <div id="sun" class="obj" style="width: 100px; height: 100px; z-index: 1;">
            <svg class="svg-icon glow-y" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </div>
          <div id="moon" class="obj drag" style="width: 95px; height: 95px; background: var(--bg-panel); border-radius: 50%; border: 2px solid var(--neon-cyan); z-index: 2;"></div>
          <div style="position:absolute; bottom:20px; color:var(--neon-red); font-family:var(--font-head);">PANELLER: ÇEVRİMDIŞI</div>
        `;
        makeDraggable($('moon'), null, (el) => {
          if (!checkCollision(el, $('sun'))) {
            playArea.querySelector('div:last-child').textContent = "PANELLER: AKTİF";
            playArea.querySelector('div:last-child').style.color = "var(--neon-green)";
            win();
          }
        });
      }
    },
    {
      title: "Modül 3: Ana sulama borusunda kritik basınç sızıntısı. Sızıntıyı durdur!",
      hint: "Fiziksel bir müdahale gerekiyor. Sızıntı olan yere parmağını (veya fareyi) basılı tut ve sistem onarılana kadar bekle.",
      fact: "Geleceğin boru hatları, kendi kendini onarabilen akıllı polimerlerden yapılacak. Bir çatlak oluştuğunda malzeme reaksiyona girerek deliği anında kapatacak.",
      setup: () => {
        playArea.innerHTML = `
          <div style="width: 80%; height: 40px; background: rgba(0,212,255,0.1); border-top: 3px solid var(--neon-cyan); border-bottom: 3px solid var(--neon-cyan); position: relative; display: flex; justify-content: center;">
            <div id="leak" class="drag" style="width: 40px; height: 40px; background: rgba(0,212,255,0.4); border-radius: 50%; box-shadow: 0 0 20px var(--neon-cyan); transform: translateY(10px); cursor: pointer; display: flex; align-items:center; justify-content:center;">
              <div id="drop" style="width: 10px; height: 10px; background: var(--neon-cyan); border-radius: 50%;"></div>
            </div>
          </div>
          <div id="bar-bg" style="position:absolute; bottom: 30px; width: 200px; height: 10px; border: 1px solid var(--neon-cyan); display: none;">
            <div id="bar-fill" style="width: 0%; height: 100%; background: var(--neon-green);"></div>
          </div>
        `;
        
        let pressTimer = null, progress = 0;
        const leak = $('leak');
        const leakAnim = setInterval(() => {
          $('drop').style.transform = `translateY(${Math.random() * 20 + 10}px)`;
          $('drop').style.opacity = Math.random();
        }, 100);

        const startFix = (e) => {
          e.preventDefault();
          $('bar-bg').style.display = 'block';
          leak.style.background = 'rgba(0,250,154,0.5)';
          pressTimer = setInterval(() => {
            progress += 5;
            $('bar-fill').style.width = progress + '%';
            if(progress >= 100) {
              clearInterval(pressTimer); clearInterval(leakAnim);
              leak.style.display = 'none'; $('bar-bg').style.display = 'none';
              win();
            }
          }, 100);
        };
        const stopFix = () => {
          clearInterval(pressTimer); progress = 0;
          $('bar-fill').style.width = '0%';
          leak.style.background = 'rgba(0,212,255,0.4)';
          $('bar-bg').style.display = 'none';
        };

        leak.onmousedown = startFix; leak.ontouchstart = startFix;
        leak.onmouseup = stopFix; leak.ontouchend = stopFix; leak.onmouseleave = stopFix;
        activeLevelLogic = () => clearInterval(leakAnim);
      }
    },
    {
      title: "Modül 4: Teslimat Dronunun şarjı bitti ve hareket edemiyor. Paketi hedefe ulaştır.",
      hint: "Eğer dron hedefe gidemiyorsa... Neden hedefi drona götürmüyorsun? Hedefi sürükle.",
      fact: "Yapay zeka destekli otonom dronlar, uçuş sırasında aerodinamik yapılarını rüzgara göre değiştirerek minimum enerji ile maksimum mesafe kat edebilecek.",
      setup: () => {
        playArea.innerHTML = `
          <div id="drone" class="obj" style="top: 20%; left: 20%; width: 60px; height: 60px;">
            <svg class="svg-icon glow-r" viewBox="0 0 24 24"><path d="M5 12h14M12 5v14M4 4l16 16M4 20L20 4"/></svg>
            <span style="position:absolute; bottom:-25px; color:var(--neon-red); font-size:12px;">PİL: %0</span>
          </div>
          <div id="target" class="obj drag" style="bottom: 20%; right: 20%; width: 80px; height: 80px; border: 2px dashed var(--neon-cyan); border-radius: 50%;">
            <span style="color:var(--neon-cyan); font-weight:bold;">HEDEF</span>
          </div>
        `;
        makeDraggable($('target'), null, (el) => {
          if (checkCollision(el, $('drone'))) {
            $('drone').innerHTML = `<svg class="svg-icon glow-g" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
            win();
          }
        });
      }
    },
    {
      title: "Modül 5: Rüzgar kesildi! Yedek enerji türbini durdu. Elektrik üretimine başla.",
      hint: "Sistem sensörlerine rüzgar estiğini inandır. Türbin pervanesine fare/parmak ile hızlıca yön ver (üzerinde kaydır/swipe).",
      fact: "Geleceğin rüzgar türbinleri kanatsız (bladeless) olacak. Rüzgarın yarattığı girdapların titreşimini elektromanyetik enerjiye çevirecekler.",
      setup: () => {
        playArea.innerHTML = `
          <div style="position:relative; width: 150px; height: 150px; display:flex; justify-content:center;">
            <div id="turbine" class="drag" style="width: 120px; height: 120px; position:absolute; top:0; z-index:2; border-radius:50%;">
              <svg class="svg-icon glow-c" viewBox="0 0 24 24" style="stroke-width:1;"><circle cx="12" cy="12" r="10"/><path d="M12 12L12 2M12 12L21.5 16M12 12L2.5 16"/></svg>
            </div>
            <div style="width: 6px; height: 100px; background: var(--neon-cyan); position:absolute; top: 60px; z-index:1;"></div>
          </div>
          <div id="energy-level" style="position:absolute; bottom:20px; font-size:1.2rem; color:var(--text-muted);">GÜÇ: 0W</div>
        `;
        
        let rotation = 0, power = 0, lastX = 0;
        const turb = $('turbine');
        
        makeDraggable(turb, (el, cx, cy) => {
          if (lastX !== 0) {
            let speed = Math.abs(cx - lastX);
            rotation += (cx > lastX ? speed : -speed);
            turb.style.transform = `rotate(${rotation}deg)`;
            power += speed;
            $('energy-level').textContent = `GÜÇ: ${Math.min(power, 1000)}W`;
            
            if (power > 1000) {
              turb.onmousedown = null; turb.ontouchstart = null; 
              turb.style.animation = "spin 1s linear infinite";
              $('energy-level').style.color = "var(--neon-green)";
              if(!document.getElementById('spinStyle')) {
                document.head.insertAdjacentHTML('beforeend', `<style id="spinStyle">@keyframes spin { 100% { transform: rotate(360deg); } }</style>`);
              }
              win();
            }
          }
          lastX = cx;
        }, () => { lastX = 0; }); 
      }
    },
    {
      title: "Modül 6: Otonom Hasat Traktörünü çalıştır. Sistem YILI doğrulama istiyor.",
      hint: "Unutma, bu bir '2050 Akıllı Çiftlik' simülatörü. Şu an hangi yıldasın?",
      fact: "Tam otonom traktörler, GPS ve yerel baz istasyonlarını birlikte kullanarak santimetre hassasiyetinde tarlayı sürebilir ve tohum ekebilir.",
      setup: () => {
        playArea.innerHTML = `
          <div class="obj" style="width: 120px; height: 120px; border: 2px dashed var(--neon-cyan); border-radius: 10px; cursor: pointer;" onclick="openPassword('Tarih Doğrulaması (Yıl)', '2050')">
            <svg class="svg-icon glow-c" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <div style="position:absolute; bottom:-30px; white-space:nowrap; font-family:var(--font-head); color:var(--neon-cyan);">KİLİDE TIKLA</div>
          </div>
        `;
      }
    },
    {
      title: "Modül 7: Sensörler tarlada zararlı bir böcek tespit etti. Ekinleri koru!",
      hint: "Böceği ezmek dijital ekosistemi bozar. Onu sürükleyip tamamen oyun alanının DIŞINA at.",
      fact: "Tarım robotları, bitkiler üzerindeki zararlıları saniyeler içinde analiz edip sadece zararlı türe etki eden mikro-lazerlerle bitkiyi koruyacak.",
      setup: () => {
        playArea.innerHTML = `
          <div id="bug" class="obj drag" style="width: 50px; height: 50px; top:40%; left:40%;">
            <svg class="svg-icon glow-r" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div class="obj" style="width:100%; height:100%; z-index:-1; opacity:0.1;">
            <svg class="svg-icon glow-g" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
        `;
        const bug = $('bug');
        makeDraggable(bug, null, (el) => {
          const rect = el.getBoundingClientRect();
          const pRect = playArea.getBoundingClientRect();
          if (rect.right < pRect.left || rect.left > pRect.right || rect.bottom < pRect.top || rect.top > pRect.bottom) {
            el.style.display = 'none';
            win();
          }
        });
      }
    },
    {
      title: "Modül 8: Hidrolik sulama valfi sıkıştı. Basıncı artırarak valfi patlatmadan aç.",
      hint: "Hidrolik pompanın üstüne çok hızlı bir şekilde art arda 5 kez tıkla.",
      fact: "Mikro-hidrolik sistemler, geleneksel motorlara göre çok daha az enerji tüketerek çok daha yüksek mekanik güç üretebilen yapay kaslar gibi çalışır.",
      setup: () => {
        playArea.innerHTML = `
          <div id="pump" class="obj" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--neon-cyan); background: rgba(0,212,255,0.1); cursor: pointer; transition: transform 0.1s;">
            <div id="p-text" style="font-size: 2rem; font-weight: bold;">0</div>
          </div>
        `;
        let clicks = 0;
        let shrinkTimer = setInterval(() => {
          if (clicks > 0) clicks--; 
          $('p-text').textContent = clicks;
          $('pump').style.transform = `scale(${1 + clicks*0.1})`;
        }, 800);

        $('pump').onclick = () => {
          clicks++;
          $('p-text').textContent = clicks;
          $('pump').style.transform = `scale(${1 + clicks*0.1})`;
          if (clicks >= 5) {
            clearInterval(shrinkTimer);
            $('pump').onclick = null;
            $('pump').style.borderColor = "var(--neon-green)";
            $('pump').style.background = "var(--neon-green)";
            $('p-text').textContent = "AÇIK";
            $('p-text').style.color = "var(--bg-dark)";
            win();
          }
        };
        activeLevelLogic = () => clearInterval(shrinkTimer);
      }
    },
    {
      title: "Modül 9: Yapay zeka stabilite testi. Ekrandaki kırmızı uyarı butonuna KESİNLİKLE BASMA.",
      hint: "Yapay zeka sabrını test ediyor. Bazen en iyi mühendislik çözümü, sisteme hiç dokunmamaktır. Sadece bekle.",
      fact: "Yapay zeka modelleri sadece girdilerle değil, sensör verilerindeki hareketsizlik veya stabilite durumlarını analiz ederek de kritik kararlar alır.",
      setup: () => {
        playArea.innerHTML = `
          <div id="red-btn" class="obj" style="width: 150px; height: 150px; background: var(--neon-red); border-radius: 50%; box-shadow: 0 0 40px var(--neon-red); cursor: pointer; display:flex; align-items:center; justify-content:center;">
            <span style="color:#fff; font-size:1.5rem; font-weight:900;">UYARI</span>
          </div>
          <div id="timer" style="position:absolute; bottom:20px; font-size:1.5rem; font-family:var(--font-head); color:var(--text-muted);">Tariyor...</div>
        `;
        let waitTime = 5;
        const countdown = setInterval(() => {
          waitTime--;
          $('timer').textContent = "Test tamamlanıyor: " + waitTime + "s";
          if (waitTime <= 0) {
            clearInterval(countdown);
            $('red-btn').style.background = "var(--neon-green)";
            $('red-btn').style.boxShadow = "0 0 40px var(--neon-green)";
            $('red-btn').innerHTML = "<span style='color:#000;'>STABİL</span>";
            $('timer').textContent = "Test Başarılı";
            $('timer').style.color = "var(--neon-green)";
            win();
          }
        }, 1000);

        $('red-btn').onclick = () => {
          clearInterval(countdown);
          $('red-btn').classList.add('shake');
          $('timer').textContent = "SİSTEM ÇÖKTÜ! Yeniden başlatılıyor...";
          $('timer').style.color = "var(--neon-red)";
          setTimeout(() => loadLevel(), 1500);
        };
        activeLevelLogic = () => clearInterval(countdown);
      }
    },
    {
      title: "Modül 10: Modül Onayı. Sunucuyu açmak için <span class='drag-word' id='w-key'>ANAHTARI</span> bul ve kilidi aç.",
      hint: "Oyunun başından beri kelimelerle neler yapabildiğini hatırla. Başlıktaki kelimeyi sürükleyip kilidin üstüne bırak.",
      fact: "Son adıma ulaştın. Biyoteknoloji, yapay zeka ve mühendisliği birleştiren zekan sayesinde modülleri başarıyla çalıştırdın.",
      setup: () => {
        playArea.innerHTML = `
          <div id="server-lock" class="obj" style="width: 100px; height: 100px; border: 3px solid var(--neon-cyan); border-radius: 20px; box-shadow: 0 0 20px rgba(0,212,255,0.2);">
            <svg class="svg-icon glow-c" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </div>
        `;
        makeDraggable($('w-key'), null, (el) => {
          if (checkCollision(el, $('server-lock'))) {
            el.style.display = 'none';
            $('server-lock').innerHTML = `<svg class="svg-icon glow-g" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke-dasharray="20" stroke-dashoffset="20" style="animation: unlock 1s forwards;"/></svg>`;
            $('server-lock').style.borderColor = "var(--neon-green)";
            if(!document.getElementById('unlockAnim')) {
              document.head.insertAdjacentHTML('beforeend', `<style id="unlockAnim">@keyframes unlock { to { stroke-dashoffset: 0; transform: translateY(-5px); } }</style>`);
            }
            win();
          }
        });
      }
    }
  ];

  // Game Engine Controls
  function loadLevel() {
    if(activeLevelLogic) activeLevelLogic();
    
    // Normal level color reset
    levelHeader.style.color = "var(--text-main)";

    // Oyun bitti, final ekranı ve büyük şifre gösterimi
    if (currentLevel === levels.length) {
      levelHeader.innerHTML = "SİSTEM ÇEVRİMİÇİ";
      levelHeader.style.color = "var(--neon-green)";
      playArea.innerHTML = `
        <div style="text-align:center;">
          <svg class="svg-icon glow-g" style="width:120px;height:120px; margin: 0 auto 20px auto; display:block;" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <h1 style="font-family:var(--font-head); color:var(--neon-cyan); font-size:2.5rem; text-shadow:0 0 20px var(--neon-cyan);">AĞ SENKRONİZE EDİLDİ</h1>
        </div>`;
      
      // Otomatik olarak final şifre popup'ını aç
      setTimeout(() => {
        showModal('finalModal');
      }, 800);
      return;
    }

    const lvl = levels[currentLevel];
    levelHeader.innerHTML = lvl.title;
    $('hint-text').innerHTML = lvl.hint;
    $('fact-text').innerHTML = lvl.fact;
    playArea.innerHTML = '';
    lvl.setup();
  }

  function nextLevel() {
    hideModal('successModal');
    currentLevel++;
    loadLevel();
  }

  // Password System (Sadece modül içindeki normal şifreler için, örn Modül 6)
  function openPassword(hintText, answer) {
    $('pw-hint').textContent = hintText;
    $('pw-input').value = "";
    expectedPW = answer.toLowerCase();
    showModal('pwModal');
    setTimeout(() => $('pw-input').focus(), 100);
  }

  // Türkçe karakter hatalarını göz ardı etmek için normalize fonksiyonu
  const normalizeTR = (str) => {
    return str.replace(/ç/g, 'c').replace(/ı/g, 'i').replace(/ş/g, 's').replace(/ğ/g, 'g').replace(/ö/g, 'o').replace(/ü/g, 'u');
  };

  function checkPassword() {
    const val = $('pw-input').value.toLowerCase().trim();
    
    if (normalizeTR(val) === normalizeTR(expectedPW)) {
      hideModal('pwModal');
      
      // Şifre doğru girilince tik işareti göster ve bölümü geç
      playArea.innerHTML = `<svg class="svg-icon glow-g" style="width:120px;height:120px;" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
      win();
      
    } else {
      $('pw-input').classList.add('shake');
      $('pw-input').style.borderColor = "var(--neon-red)";
      setTimeout(() => {
        $('pw-input').classList.remove('shake');
        $('pw-input').style.borderColor = "var(--neon-cyan)";
      }, 400);
    }
  }

  // Input üzerinde Enter'a basıldığında da şifreyi kontrol et
  $('pw-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') checkPassword();
  });

  // Start the game
  window.onload = loadLevel;

</script>
</body>
</html>
